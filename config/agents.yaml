execution:
  default_engine: claude-cli

agents:
  analyst:
    engine: claude-cli
    model: opus
    max_turns: 50
    timeout_minutes: 30
    allowed_tools:
      - Read
      - Write
      - Glob
      - Bash
    prompt_file: agents/analyst/prompts/system.md

  planner:
    engine: claude-cli
    model: opus
    max_turns: 50
    timeout_minutes: 30
    allowed_tools:
      - Read
      - Write
      - Grep
      - Bash
    prompt_file: agents/planner/prompts/system.md

  generators:
    ui:
      engine: claude-cli
      model: sonnet
      max_turns: 100
      timeout_minutes: 60
      allowed_tools:
        - Read
        - Write
        - Edit
        - Bash
        - Glob
        - Grep
      prompt_file: agents/generators/ui/prompts/vue_system.md

    api:
      engine: claude-cli
      model: sonnet
      max_turns: 100
      timeout_minutes: 60
      allowed_tools:
        - Read
        - Write
        - Edit
        - Bash
        - Glob
        - Grep
      prompt_file: agents/generators/api/prompts/springboot_system.md

  reviewers:
    ui_reviewer:
      engine: claude-cli
      model: opus
      max_turns: 20
      timeout_minutes: 15
      allowed_tools:
        - Read
        - Glob
        - Grep
        - Bash
      prompt_file: agents/reviewers/ui_reviewer/prompts/review_criteria.md

    api_reviewer:
      engine: claude-cli
      model: opus
      max_turns: 20
      timeout_minutes: 15
      allowed_tools:
        - Read
        - Glob
        - Grep
        - Bash
      prompt_file: agents/reviewers/api_reviewer/prompts/review_criteria.md

  evaluator:
    engine: claude-cli
    model: opus
    max_turns: 50
    timeout_minutes: 30
    allowed_tools:
      - Read
      - Bash
      - Glob
      - Grep
      - "mcp:playwright"
    prompt_file: agents/evaluator/prompts/global_qa.md
